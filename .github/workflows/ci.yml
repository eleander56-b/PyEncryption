name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/pyencryption/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not gui"

      - name: Check test coverage
        run: pytest tests/ -m "not gui" --cov=pyencryption --cov-report=term-missing --cov-fail-under=80 --cov-config=pyproject.toml
